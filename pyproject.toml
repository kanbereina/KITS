[project]
name = "KITS"
version = "0.1.0"
description = "基于 openai/whisper-large-v3-turbo 的鹿乃 Twitch 直播总结工具。"
readme = "README.md"
authors = [
    { name = "KanbeReina", email = "kano.2525@qq.com" }
]
requires-python = ">=3.12,<3.15"
dependencies = [
    "transformers[torch]>=5.0",
]

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"

[[tool.uv.index]]
name = "aliyun-pytorch"
url = "https://mirrors.aliyun.com/pytorch-wheels/cu128"

[tool.uv.sources]
torch = { index = "aliyun-pytorch" }
