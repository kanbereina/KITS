[project]
name = "KITS"
version = "0.3.0"
description = "基于 openai/whisper-large-v3-turbo 的鹿乃 Twitch 直播总结工具，支持 50 系 Nvidia 显卡"
readme = "README.md"
authors = [
    { name = "KanbeReina", email = "kano.2525@qq.com" }
]
requires-python = ">=3.12,<3.15"
dependencies = [
    "httpx>=0.28.1",
    "huggingface-hub>=1.19.0",
    "torch>=2.11.0",
    "transformers>=5.12.0",
]

[project.scripts]
kits = "kits.cli:main"

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"

[tool.uv.sources]
torch = { index = "pytorch-cu128" }
torchvision = { index = "pytorch-cu128" }
torchaudio = { index = "pytorch-cu128" }

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "ruff>=0.15.17",
]
